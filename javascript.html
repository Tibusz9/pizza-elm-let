<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript CRUD</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <h1>Web programozás-1 Előadás Házi feladat</h1>
    <nav>
      <a href="index.html">Főoldal</a><a href="javascript.html">JavaScript CRUD</a><a href="react.html">React CRUD</a><a href="spa.html">SPA</a><a href="fetchapi.html">Fetch API</a><a href="axios.html">Axios + React</a><a href="oojs.html">OOJS</a>
    </nav>
  </header>
  <main>
    <section class="card">
      <h2>Rendelések kezelése</h2>
      <div class="grid">
        <div>
          <label>Pizza neve</label><input id="pizzanev" placeholder="pl. Popey, Kagylós" />
        </div>
        <div>
          <label>Darab</label><input id="darab" type="number" placeholder="1" min="1" />
        </div>
        <div>
          <label>Felvétel (YYYY.MM.DD HH:MM:SS)</label><input id="felvetel" placeholder="2000.11.12 11:21:00" />
        </div>
        <div>
          <label>Kiszállítás (YYYY.MM.DD HH:MM:SS)</label><input id="kiszallitas" placeholder="2000.11.12 12:11:00" />
        </div>
      </div>
      <div class="actions" style="margin-top:.75rem">
        <button id="saveBtn">Mentés (Create / Update)</button>
        <button id="resetBtn" class="secondary">Űrlap törlése</button>
      </div>
      <p id="msg" class="muted"></p>
      <table>
        <thead><tr><th>Pizza neve</th><th>Darab</th><th>Felvétel idő</th><th>Kiszállítás idő</th><th>Művelet</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>
  <footer>Készítők: <strong>Mészáros Tibor Ákos - Z21NS6</strong>, <strong>Becskeházi-Facskó Edit - CZU6N7</strong></footer>
  <script src="data/ordersData.js"></script>
  <script src="assets/js/javascript-crud.js"></script>
</body>
</html>
